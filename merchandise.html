<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band & Show Merch | HG Customs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>

    <style>
        :root { --text-dark: #000000; --text-muted: #555555; --bg-light: #f9f9f9; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background-color: #ffffff; }
        
        /* [Header/Nav styles remain consistent with your template] */
        .catalog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid var(--border-color); padding: 25px; display: flex; flex-direction: column; }
        .product-image-wrapper { text-align: center; margin-bottom: 15px; border: 1px solid var(--border-color); padding: 10px; background: var(--bg-light); }
        .product-image-wrapper img { max-width: 100%; height: 200px; object-fit: contain; }
        .btn-customize { background: #000; color: #fff; border: none; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: 600; margin-top: 15px; }
        
        /* Modal Additions */
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal.is-active { display: flex; }
        .modal-content { background: #fff; max-width: 440px; width: 90%; padding: 35px; }
        .form-select, .form-textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--border-color); font-family: inherit; }
        .label-text { font-size: 12px; font-weight: 700; text-transform: uppercase; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <main class="catalog-container">
        <h1>Band & Show Merchandise</h1>
        <div class="product-grid">
            <!-- Example: Products that need Color/Size -->
            <div class="product-card">
                <div class="product-image-wrapper"><img src="merch-2.jpg" alt="Embroidered Dad Caps"></div>
                <div class="prod-title">Embroidered Dad Caps</div>
                <button class="btn-customize" onclick="openProductModal('Embroidered Dad Caps', 12.50, 'merch-2.jpg', true, true)">Design & Buy</button>
            </div>
            <!-- ... Repeat for other 5 items ... -->
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">Product</h2>
            
            <div id="colorWrapper">
                <span class="label-text">Select Colour</span>
                <select id="itemColor" class="form-select">
                    <option value="Black">Black</option>
                    <option value="White">White</option>
                    <option value="Navy">Navy</option>
                    <option value="Red">Red</option>
                </select>
            </div>

            <div id="sizeWrapper">
                <span class="label-text">Select Size</span>
                <select id="itemSize" class="form-select">
                    <option value="OSFA">One Size Fits All</option>
                    <option value="S">Small</option>
                    <option value="M">Medium</option>
                    <option value="L">Large</option>
                </select>
            </div>

            <textarea id="userText" class="form-textarea" placeholder="Custom text requirements..."></textarea>
            <button id="add-to-basket-btn" class="btn-customize" onclick="addToBasket()">Add To Basket</button>
        </div>
    </div>

    <script>
        let currentProduct = {};

        function openProductModal(title, price, image, showColor, showSize) {
            currentProduct = { title, price, image };
            document.getElementById('modalTitle').innerText = title;
            
            // Toggle visibility based on product type
            document.getElementById('colorWrapper').style.display = showColor ? 'block' : 'none';
            document.getElementById('sizeWrapper').style.display = showSize ? 'block' : 'none';
            
            document.getElementById('productModal').classList.add('is-active');
        }

        function addToBasket() {
            const cart = JSON.parse(localStorage.getItem('hg_cart')) || [];
            cart.push({
                ...currentProduct,
                color: document.getElementById('itemColor').value,
                size: document.getElementById('itemSize').value,
                text: document.getElementById('userText').value,
                quantity: 1
            });
            localStorage.setItem('hg_cart', JSON.stringify(cart));
            document.getElementById('productModal').classList.remove('is-active');
            alert('Added to cart!');
        }
    </script>
</body>
</html>
