<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom T-Shirts | HG Customs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --text-dark: #000000; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; }

        /* Navigation with Dropdown */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-item { position: relative; cursor: pointer; font-weight: 600; font-size: 13px; text-transform: uppercase; }
        .dropdown { position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid var(--border-color); display: none; min-width: 150px; z-index: 1000; }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { display: block; padding: 10px; text-decoration: none; color: #000; }

        /* 3x2 Product Grid */
        .catalog-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .product-card { border: 1px solid var(--border-color); padding: 20px; text-align: center; }
        .btn-customize { background: #000; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; margin-top: 15px; }

        /* Modal Styles */
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal.is-active { display: flex; }
        .modal-content { background: #fff; width: 400px; padding: 30px; }
        .color-swatch-grid { display: flex; gap: 10px; margin: 15px 0; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #ccc; }
        .form-select { width: 100%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo"><strong>HG CUSTOMS</strong></div>
        <nav>
            <ul class="nav-links">
                <li class="nav-item">
                    Shop
                    <div class="dropdown">
                        <a href="t-shirts.html">T-Shirts</a>
                        <a href="hoodies.html">Hoodies</a>
                        <a href="mugs.html">Mugs</a>
                    </div>
                </li>
                <li><a href="about.html" style="text-decoration:none; color:#000;">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="catalog-container">
        <h1>Custom Graphic T-Shirts</h1>
        <div class="product-grid" id="productGrid">
            <!-- 6 Items via Script for consistency -->
            <script>
                const items = ["Essential Tee", "Heavy Tee", "V-Neck", "Long Sleeve", "Organic Tee", "Performance"];
                items.forEach(name => {
                    document.write(`
                        <div class="product-card">
                            <div style="height:200px; background:#f4f4f4; margin-bottom:10px;"></div>
                            <h3>${name}</h3>
                            <button class="btn-customize" onclick="openModal('${name}')">Design & Buy</button>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">Product</h2>
            <div class="color-swatch-grid">
                <div class="color-swatch" style="background:#fff"></div>
                <div class="color-swatch" style="background:#000"></div>
                <div class="color-swatch" style="background:red"></div>
                <div class="color-swatch" style="background:blue"></div>
                <div class="color-swatch" style="background:green"></div>
            </div>
            <select class="form-select">
                <option>XS</option><option>S</option><option>M</option><option>L</option>
                <option>XL</option><option>XXL</option><option>XXXL</option>
            </select>
            <button class="btn-customize" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function openModal(name) { document.getElementById('modalTitle').innerText = name; document.getElementById('productModal').classList.add('is-active'); }
        function closeModal() { document.getElementById('productModal').classList.remove('is-active'); }
    </script>
</body>
</html>
