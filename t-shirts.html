<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom T-Shirts | HG Customs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
    <style>
        :root { --text-dark: #000000; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; }

        /* Navigation */
        .announcement-bar { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 11px; text-transform: uppercase; }
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: #000; font-weight: 600; font-size: 13px; text-transform: uppercase; }

        /* Catalog */
        .catalog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid var(--border-color); padding: 20px; text-align: center; }
        .product-card img { width: 100%; height: 200px; background: #eee; margin-bottom: 15px; }
        .btn-customize { background: #000; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; margin-top: 15px; }

        /* Modal */
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal.is-active { display: flex; }
        .modal-content { background: #fff; width: 400px; padding: 30px; position: relative; }
        .color-swatch-grid { display: flex; gap: 10px; margin: 15px 0; }
        .color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.is-selected { border-color: #000; transform: scale(1.1); }
        .form-select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div class="announcement-bar">Free UK Delivery on orders over £50</div>
    <header class="main-header">
        <div class="logo"><strong>HG CUSTOMS</strong></div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Shop All</a></li>
                <li><a href="#">T-Shirts</a></li>
                <li><a href="#">Hoodies</a></li>
                <li><a href="#">Accessories</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
        <div class="cart-icon"><i class="fa-solid fa-basket-shopping"></i></div>
    </header>

    <main class="catalog-container">
        <h1>Custom Graphic T-Shirts</h1>
        <div class="product-grid" id="productGrid">
            <!-- 6 Product Placeholders -->
            <script>
                const products = ["Classic Tee", "Heavyweight Tee", "V-Neck Tee", "Long Sleeve", "Organic Cotton", "Performance Fit"];
                products.forEach(name => {
                    document.write(`
                        <div class="product-card">
                            <img src="https://placehold.co/300x300?text=Apparel" alt="${name}">
                            <h3>${name}</h3>
                            <button class="btn-customize" onclick="openProductModal('${name}')">Design & Buy</button>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">Select Options</h2>
            <div class="color-swatch-grid" id="colorGrid">
                <div class="color-swatch" style="background:#fff; border: 1px solid #ccc;" onclick="selectColor(this, 'White')"></div>
                <div class="color-swatch" style="background:#000;" onclick="selectColor(this, 'Black')"></div>
                <div class="color-swatch" style="background:#ff0000;" onclick="selectColor(this, 'Red')"></div>
                <div class="color-swatch" style="background:#0000ff;" onclick="selectColor(this, 'Blue')"></div>
                <div class="color-swatch" style="background:#008000;" onclick="selectColor(this, 'Green')"></div>
            </div>

            <select id="productSize" class="form-select">
                <option value="XS">XS</option>
                <option value="S">Small</option>
                <option value="M">Medium</option>
                <option value="L">Large</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
                <option value="XXXL">XXXL</option>
            </select>

            <button id="upload_widget" class="btn-customize" style="background:#444;">Upload Design</button>
            <button class="btn-customize" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        function openProductModal(name) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('productModal').classList.add('is-active');
        }
        function closeModal() { document.getElementById('productModal').classList.remove('is-active'); }
        function selectColor(el, color) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('is-selected'));
            el.classList.add('is-selected');
        }
    </script>
</body>
</html>
