<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Mugs | HG Customs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Cloudinary Widget Script -->
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>

    <style>
        :root { --text-dark: #000000; --bg-light: #f9f9f9; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background-color: #ffffff; }
        
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .logo img { height: 40px; }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 12px; text-transform: uppercase; }
        
        @media (max-width: 768px) {
            .main-header { padding: 15px; justify-content: space-between; }
            .nav-links { display: none; width: 100%; flex-direction: column; gap: 15px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
            .nav-links.is-open { display: flex; }
            .mobile-toggle { display: block; font-size: 20px; cursor: pointer; }
        }
        @media (min-width: 769px) { .mobile-toggle { display: none; } }

        .catalog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid var(--border-color); padding: 15px; }
        .btn-customize { background: #000; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; margin-top: 10px; }
        
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.is-active { display: flex; }
        .modal-content { background: #fff; max-width: 400px; width: 90%; padding: 30px; border-radius: 8px; }
        textarea { width: 100%; height: 80px; margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo"><a href="index.html"><img src="logo.png" alt="Logo"></a></div>
        <div class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('is-open')"><i class="fa-solid fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="mugs.html">Mugs</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="header-actions">
            <a href="cart.html"><i class="fa-solid fa-basket-shopping"></i> <span class="cart-count">0</span></a>
        </div>
    </header>

    <main class="catalog-container">
        <h1>Custom Ceramic Mugs</h1>
        <div class="product-grid">
            <div class="product-card">
                <h3>Standard Mug</h3>
                <p>£8.99</p>
                <button class="btn-customize" onclick="openProductModal('Standard Mug', '8.99')">Design & Buy</button>
            </div>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">Product</h2>
            <textarea id="userText" placeholder="Inscription notes..."></textarea>
            
            <button id="upload_widget" class="btn-customize" style="background:#444;">Upload Design File</button>
            <input type="hidden" id="uploaded_file_url">
            
            <button class="btn-customize" onclick="addToBasket()">Add To Basket</button>
        </div>
    </div>

    <script>
        // Cloudinary Widget Initialization
        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'opdnamfa', 
            uploadPreset: 'hg_customs_preset'
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                document.getElementById('uploaded_file_url').value = result.info.secure_url;
                alert('File uploaded successfully!');
            }
        });

        document.getElementById("upload_widget").addEventListener("click", function(){
            myWidget.open();
        }, false);

        function openProductModal(t, p) {
            document.getElementById('modalTitle').innerText = t;
            // Clear inputs for fresh entry
            document.getElementById('uploaded_file_url').value = '';
            document.getElementById('userText').value = '';
            document.getElementById('productModal').classList.add('is-active');
        }

        function addToBasket() {
            const title = document.getElementById('modalTitle').innerText;
            const notes = document.getElementById('userText').value;
            const fileUrl = document.getElementById('uploaded_file_url').value;
            
            let cart = JSON.parse(localStorage.getItem('hg_cart')) || [];
            cart.push({ title, notes, fileUrl: fileUrl || "No file uploaded" });
            localStorage.setItem('hg_cart', JSON.stringify(cart));
            
            document.getElementById('productModal').classList.remove('is-active');
            updateBadge();
            alert('Added to basket!');
        }

        function updateBadge() {
            const cart = JSON.parse(localStorage.getItem('hg_cart')) || [];
            document.querySelector('.cart-count').innerText = cart.length;
        }
        updateBadge();
    </script>
</body>
</html>
