<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Mugs | HG Customs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>

    <style>
        :root { --text-dark: #000000; --text-muted: #555555; --bg-light: #f9f9f9; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background-color: #ffffff; }
        
        /* Layout */
        .catalog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid var(--border-color); padding: 25px; display: flex; flex-direction: column; }
        .btn-customize { background: #000; color: #fff; border: none; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: 600; margin-top: auto; }
        
        /* Modal & Image Preview */
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal.is-active { display: flex; }
        .modal-content { background: #fff; max-width: 440px; width: 90%; padding: 35px; border: 1px solid var(--border-color); position: relative; }
        .preview-container { text-align: center; margin-bottom: 15px; display: none; }
        .preview-container img { max-width: 100%; max-height: 120px; object-fit: contain; border: 1px solid var(--border-color); padding: 4px; }
        
        /* Color Swatches */
        .color-selection-wrapper { margin: 15px 0; }
        .color-selection-label { font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .color-swatch-grid { display: flex; gap: 12px; }
        .color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
        .color-swatch.is-selected { border-color: #000; transform: scale(1.1); }
        
        /* Form Elements */
        .form-textarea { width: 100%; height: 80px; padding: 12px; margin: 10px 0; border: 1px solid var(--border-color); }
        .quantity-wrapper { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; padding-top: 10px; border-top: 1px solid var(--border-color); }
        .qty-btn { background: none; border: 1px solid var(--border-color); width: 36px; height: 36px; cursor: pointer; }
        .qty-input { width: 45px; height: 36px; border: 1px solid var(--border-color); text-align: center; }
    </style>
</head>
<body>

    <main class="catalog-container">
        <h1>Custom 11oz Ceramic Mugs</h1>
        <div class="product-grid">
            <div class="product-card">
                <div class="prod-title">Classic Accent Mug</div>
                <div class="prod-price">£8.99</div>
                <button class="btn-customize" onclick="openProductModal('Classic Accent Mug', 8.99)">Design & Buy</button>
            </div>
            <!-- Additional product cards go here -->
        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="close-modal" onclick="document.getElementById('productModal').classList.remove('is-active')" style="position: absolute; right: 20px; top: 15px; border: none; background: none; cursor: pointer; font-size: 18px;">&times;</button>
            <h2 id="modalTitle">Product</h2>
            
            <div id="imagePreviewContainer" class="preview-container">
                <img id="imagePreview" src="" alt="Design Preview">
            </div>

            <div class="color-selection-wrapper">
                <label class="color-selection-label">Select Color: <span id="currentColorLabel">White</span></label>
                <div class="color-swatch-grid">
                    <div class="color-swatch is-selected" style="background-color: #ffffff; border: 1px solid #ddd;" onclick="selectColor(this, 'White')"></div>
                    <div class="color-swatch" style="background-color: #e51a1a;" onclick="selectColor(this, 'Red')"></div>
                    <div class="color-swatch" style="background-color: #1a5be5;" onclick="selectColor(this, 'Blue')"></div>
                </div>
            </div>

            <textarea id="userText" class="form-textarea" placeholder="Inscription notes..."></textarea>
            <button id="upload_widget" class="btn-customize" style="background: #444;">Upload Design</button>
            
            <div class="quantity-wrapper">
                <span>Quantity</span>
                <div class="quantity-controls">
                    <button type="button" class="qty-btn" onclick="adjustModalQty(-1)">-</button>
                    <input type="number" id="modalQuantity" class="qty-input" value="1">
                    <button type="button" class="qty-btn" onclick="adjustModalQty(1)">+</button>
                </div>
            </div>
            <button class="btn-customize" onclick="addToBasket()">Add To Basket</button>
        </div>
    </div>

    <script>
        let selectedMugColor = "White";
        var myWidget = cloudinary.createUploadWidget({ cloudName: 'opdnamfa', uploadPreset: 'hg_customs_preset' }, (e, r) => {
            if (!e && r && r.event === "success") {
                document.getElementById('imagePreview').src = r.info.secure_url;
                document.getElementById('imagePreviewContainer').style.display = 'block';
            }
        });

        document.getElementById("upload_widget").onclick = () => myWidget.open();

        function openProductModal(title, price) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('productModal').classList.add('is-active');
        }

        function selectColor(el, col) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('is-selected'));
            el.classList.add('is-selected');
            selectedMugColor = col;
            document.getElementById('currentColorLabel').innerText = col;
        }

        function adjustModalQty(amt) {
            let q = document.getElementById('modalQuantity');
            q.value = Math.max(1, parseInt(q.value) + amt);
        }

        function addToBasket() {
            alert('Added to basket!');
            document.getElementById('productModal').classList.remove('is-active');
        }
    </script>
</body>
</html>
