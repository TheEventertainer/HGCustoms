<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Mugs | HG Customs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>

    <style>
        :root { --text-dark: #000000; --text-muted: #555555; --bg-light: #f9f9f9; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background-color: #ffffff; }
        
        /* Layout */
        .announcement-bar { background-color: #000000; color: #ffffff; display: flex; justify-content: space-around; padding: 12px 20px; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #333; }
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        
        .catalog-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { border: 1px solid var(--border-color); padding: 25px; text-align: center; }
        .product-image { width: 100%; height: 250px; object-fit: cover; background-color: var(--bg-light); margin-bottom: 20px; }
        
        .btn-customize { background: #000; color: #fff; border: none; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: 600; margin-top: 15px; }
        
        /* Modal */
        .modal { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal.is-active { display: flex; }
        .modal-content { background: #fff; max-width: 440px; width: 90%; padding: 35px; position: relative; }
        
        .color-swatch-grid { display: flex; gap: 12px; margin: 15px 0; }
        .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.is-selected { border-color: #000; transform: scale(1.1); }

        @media (max-width: 768px) { .main-header { padding: 20px; } }
    </style>
</head>
<body>

    <div class="announcement-bar">Free UK Delivery on orders over £50</div>
    
    <header class="main-header">
        <div class="logo">HG Customs</div>
    </header>

    <main class="catalog-container">
        <h1>Custom Ceramic Mugs</h1>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://placehold.co/300x300" alt="Mug" class="product-image">
                <h3>11oz Classic White</h3>
                <button class="btn-customize" onclick="openModal('11oz Classic White', 8.99)">Design & Buy</button>
            </div>
            <div class="product-card">
                <img src="https://placehold.co/300x300" alt="Mug" class="product-image">
                <h3>11oz Color Inner</h3>
                <button class="btn-customize" onclick="openModal('11oz Color Inner', 9.99)">Design & Buy</button>
            </div>
            <div class="product-card">
                <img src="https://placehold.co/300x300" alt="Mug" class="product-image">
                <h3>Magic Changing Mug</h3>
                <button class="btn-customize" onclick="openModal('Magic Changing Mug', 12.50)">Design & Buy</button>
            </div>
            <div class="product-card">
                <img src="https://placehold.co/300x300" alt="Mug" class="product-image">
                <h3>15oz Large Ceramic</h3>
                <button class="btn-customize" onclick="openModal('15oz Large Ceramic', 11.99)">Design & Buy</button>
            </div>
            <div class="product-card">
                <img src="https://placehold.co/300x300" alt="Mug" class="product-image">
                <h3>12oz Enamel Camp</h3>
                <button class="btn-customize" onclick="openModal('12oz Enamel Camp', 10.50)">Design & Buy</button>
            </div>
            <div class="product-card">
                <img src="https://placehold.co/300x300" alt="Mug" class="product-image">
                <h3>12oz Tall Latte</h3>
                <button class="btn-customize" onclick="openModal('12oz Tall Latte', 11.00)">Design & Buy</button>
            </div>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h2 id="modalTitle">Customize</h2>
            <div class="color-swatch-grid">
                <div class="color-swatch is-selected" style="background: #fff; border: 1px solid #ccc;" onclick="selectColor(this, 'White')"></div>
                <div class="color-swatch" style="background: #000;" onclick="selectColor(this, 'Black')"></div>
                <div class="color-swatch" style="background: #1a5be5;" onclick="selectColor(this, 'Blue')"></div>
            </div>
            <button id="upload_widget" class="btn-customize">Upload Design</button>
            <button class="btn-customize" style="background:#555;" onclick="document.getElementById('productModal').classList.remove('is-active')">Close</button>
        </div>
    </div>

    <script>
        let selectedColor = "White";
        
        function openModal(title, price) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('productModal').classList.add('is-active');
        }

        function selectColor(el, color) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('is-selected'));
            el.classList.add('is-selected');
            selectedColor = color;
        }

        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'opdnamfa', 
            uploadPreset: 'hg_customs_preset'
        }, (error, result) => { if (!error && result.event === "success") alert("Uploaded!"); });

        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());
    </script>
</body>
</html>
