<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Basket | HG Customs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px 20px; max-width: 800px; margin: auto; }
        h1 { margin-bottom: 30px; }
        .cart-item { border-bottom: 1px solid #eee; padding: 20px 0; }
        .total-section { font-weight: bold; margin: 20px 0; font-size: 1.2em; }
        .btn-checkout { background: #000; color: #fff; border: none; padding: 15px 30px; cursor: pointer; text-transform: uppercase; font-weight: 600; width: 100%; max-width: 300px; }
        .btn-shopping { background: #eee; color: #333; border: none; padding: 15px 30px; cursor: pointer; text-decoration: none; display: inline-block; }
        .clear-btn { border:none; background:none; color:red; cursor:pointer; margin-left:20px; }
    </style>
</head>
<body>

    <h1>Your Shopping Basket</h1>
    
    <div id="cart-items">
        <!-- Cart items will be injected here -->
    </div>

    <div id="total-price" class="total-section"></div>

    <!-- Hidden form to pass data to FormBold -->
    <form id="checkout-form" action="https://formbold.com/s/oYA8D" method="POST">
        <input type="hidden" name="Order_Summary" id="order_details_input">
        <input type="hidden" name="_subject" value="New Custom Order Received!">
        <button type="submit" class="btn-checkout">Checkout (Pay via PayPal)</button>
    </form>

    <div style="margin-top: 30px;">
        <a href="mugs.html" class="btn-shopping">← Continue Shopping</a>
        <button onclick="clearCart()" class="clear-btn">Clear Basket</button>
    </div>

    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem('hg_cart')) || [];
            const container = document.getElementById('cart-items');
            const totalDiv = document.getElementById('total-price');
            const orderInput = document.getElementById('order_details_input');
            
            if (cart.length === 0) {
                container.innerHTML = "<p>Your basket is currently empty.</p>";
                document.getElementById('checkout-form').style.display = 'none';
                return;
            }

            let total = 0;
            let summary = "--- NEW ORDER DETAILS ---\n";
            container.innerHTML = ""; 

            cart.forEach((item, index) => {
                total += item.price;
                summary += `
Item ${index + 1}: ${item.title}
Color: ${item.color}
Price: £${item.price.toFixed(2)}
Design Link: ${item.img}
--------------------------
`;
                container.innerHTML += `
                    <div class="cart-item">
                        <p><strong>${item.title}</strong><br>
                        Color: ${item.color}<br>
                        Price: £${item.price.toFixed(2)}<br>
                        Design: <a href="${item.img}" target="_blank">View Uploaded Image</a></p>
                    </div>
                `;
            });

            totalDiv.innerText = "Total: £" + total.toFixed(2);
            orderInput.value = summary; 
        }

        function clearCart() {
            localStorage.removeItem('hg_cart');
            location.reload();
        }

        window.onload = loadCart;
    </script>
</body>
</html>
