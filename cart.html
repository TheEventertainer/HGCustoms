<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Basket | HG Customs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px 20px; max-width: 800px; margin: auto; }
        .cart-item { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #eee; padding: 20px 0; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; }
        .btn-clear { background: #ff4d4d; color: #fff; border: none; padding: 10px 20px; cursor: pointer; margin-top: 20px; }
        h1 { margin-bottom: 30px; }
    </style>
</head>
<body>

    <h1>Your Shopping Basket</h1>
    <div id="cart-items"></div>
    <div id="total-price" style="font-weight: bold; margin-top: 20px;"></div>
    <button class="btn-clear" onclick="clearCart()">Clear Basket</button>
    <br><br>
    <a href="mugs.html">← Continue Shopping</a>

    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem('hg_cart')) || [];
            const container = document.getElementById('cart-items');
            const totalDiv = document.getElementById('total-price');
            
            if (cart.length === 0) {
                container.innerHTML = "<p>Your basket is currently empty.</p>";
                return;
            }

            let total = 0;
            container.innerHTML = ""; // Clear current display

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="Design">
                        <div>
                            <strong>${item.title}</strong><br>
                            Color: ${item.color} <br>
                            Price: £${item.price.toFixed(2)}
                        </div>
                    </div>
                `;
            });

            totalDiv.innerText = "Total: £" + total.toFixed(2);
        }

        function clearCart() {
            localStorage.removeItem('hg_cart');
            location.reload(); // Refresh the page to show empty state
        }

        window.onload = loadCart;
    </script>
</body>
</html>
