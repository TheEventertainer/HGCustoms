<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Basket | HG Customs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=GBP"></script>

    <style>
        :root { --text-dark: #000000; --text-muted: #555555; --bg-light: #f9f9f9; --border-color: #e5e5e5; --font-sans: 'Inter', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); color: var(--text-dark); background-color: #ffffff; display: flex; flex-direction: column; min-height: 100vh; }
        
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); background: #fff; position: relative; z-index: 100; }
        .logo img { height: 55px; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 13px; text-transform: uppercase; }
        .cart-container { max-width: 1200px; margin: 50px auto; padding: 0 20px; flex-grow: 1; width: 100%; }
        .cart-title { font-size: 28px; text-transform: uppercase; margin-bottom: 30px; border-bottom: 2px solid var(--text-dark); padding-bottom: 15px; }
        .cart-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 50px; }
        .order-summary-box { background-color: var(--bg-light); padding: 30px; border: 1px solid var(--border-color); height: fit-content; }
        .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 15px; color: var(--text-muted); }
        .total-row { border-top: 1px solid var(--border-color); padding-top: 15px; font-size: 18px; font-weight: 700; color: var(--text-dark); }
        
        /* Updated Loader for PayPal */
        #paypal-button-container { min-height: 150px; position: relative; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; z-index: 10; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo"><a href="index.html"><img src="logo.png" alt="HG Customs"></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="t-shirts.html">T-Shirts</a></li>
            <li><a href="cart.html">Basket <span class="cart-count">0</span></a></li>
        </ul>
    </header>

    <main class="cart-container">
        <h1 class="cart-title">Your Shopping Basket</h1>
        <div id="cart-content-wrapper" class="cart-wrapper" style="display: none;">
            <div class="cart-items-list" id="itemsContainer"></div>
            <div class="order-summary-box">
                <div id="paypal-button-container"></div>
            </div>
        </div>
    </main>

    <script>
        let cart = [];
        let activeDiscountPercent = 0;
        const COUPON_REGISTRY = { "WELCOME10": 10, "HGCSUMMER20": 20 };

        function loadCart() {
            cart = JSON.parse(localStorage.getItem('hg_cart')) || [];
            renderCart();
        }

        function showPaypalLoader() {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = '<div class="loading-overlay">Updating totals...</div>';
        }

        function initPayPalButtons() {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = ''; // Clear loader
            
            paypal.Buttons({
                createOrder: function(data, actions) {
                    // Logic to ensure precision: calculate total, then distribute discount proportionally
                    let subtotal = cart.reduce((sum, item) => sum + item.price, 0);
                    let discountAmount = subtotal * (activeDiscountPercent / 100);
                    let scale = subtotal > 0 ? (subtotal - discountAmount) / subtotal : 1;
                    
                    const paypalItems = cart.map(item => ({
                        name: item.title,
                        unit_amount: { currency_code: "GBP", value: (item.price * scale).toFixed(2) },
                        quantity: "1"
                    }));

                    return actions.order.create({
                        purchase_units: [{
                            amount: { 
                                currency_code: "GBP", 
                                value: (subtotal - discountAmount + (subtotal - discountAmount > 50 ? 0 : 3.99)).toFixed(2) 
                            },
                            items: paypalItems
                        }]
                    });
                },
                onApprove: (data, actions) => actions.order.capture().then(() => {
                    localStorage.removeItem('hg_cart');
                    window.location.href = "index.html";
                })
            }).render('#paypal-button-container');
        }

        // Trigger loader whenever cart state changes
        function refreshCheckout() {
            showPaypalLoader();
            setTimeout(initPayPalButtons, 500); // Simulate network delay for user awareness
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            if (cart.length > 0) refreshCheckout();
        });
    </script>
</body>
</html>
