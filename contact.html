<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | HG Customs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --text-dark: #000000; --text-muted: #555555; --bg-light: #f9f9f9; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background-color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header & Mobile Toggle */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .logo { font-weight: 700; letter-spacing: 1px; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .mobile-toggle { display: none; font-size: 20px; cursor: pointer; }
        
        @media (max-width: 768px) {
            .mobile-toggle { display: block; }
            .nav-links { display: none; width: 100%; flex-direction: column; gap: 15px; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px; }
            .nav-links.is-open { display: flex; }
        }

        /* Contact Section */
        .contact-container { max-width: 1100px; margin: 60px auto; padding: 0 40px; flex-grow: 1; width: 100%; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea { padding: 14px; border: 1px solid var(--border-color); width: 100%; }
        .submit-btn { background: #000; color: #fff; border: none; padding: 16px; width: 100%; text-transform: uppercase; font-weight: 600; cursor: pointer; }
        
        @media (max-width: 992px) { .contact-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">HG CUSTOMS</div>
        <div class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('is-open')">
            <i class="fa-solid fa-bars"></i>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <h1>Get in Touch</h1>
        <div class="contact-grid">
            <div class="contact-channels">
                <a href="https://wa.me/447702498975" class="channel-card" style="display: flex; align-items: center; gap: 20px; padding: 25px; border: 1px solid var(--border-color); text-decoration: none; color: #000; margin-top: 20px;">
                    <i class="fa-brands fa-whatsapp" style="color: #25D366; font-size: 28px;"></i>
                    <div><h3>WhatsApp Chat</h3><p>Message us for support</p></div>
                </a>
            </div>

            <div class="contact-form-wrapper">
                <h2>Send a Message</h2>
                <form action="https://formspree.io/f/mwvglzgz" method="POST">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
