<!-- Global Support Widget -->
    <div id="helpChatWidget" style="position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: 'Inter', sans-serif;">
        <button onclick="toggleChatMenu()" style="background: #000; color: #fff; border: none; padding: 15px 20px; border-radius: 30px; font-weight: 600; font-size: 13px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px;">
            <i class="fa-regular fa-comments" style="font-size: 16px;"></i> Need Help?
        </button>
        <div id="chatChannelsMenu" style="display: none; position: absolute; bottom: 65px; right: 0; background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); width: 220px; overflow: hidden; flex-direction: column;">
            <div style="background: #000; color: #fff; padding: 12px; font-size: 11px; text-transform: uppercase; font-weight: 700; text-align: center;">Chat With Us</div>
            <a href="https://wa.me/447702498975" target="_blank" style="display: flex; align-items: center; gap: 12px; padding: 15px; color: #000; text-decoration: none; font-size: 13px; font-weight: 600; border-bottom: 1px solid #f0f0f0;">
                <i class="fa-brands fa-whatsapp" style="color: #25D366; font-size: 18px;"></i> WhatsApp
            </a>
            <a href="https://m.me/hgcustoms" target="_blank" style="display: flex; align-items: center; gap: 12px; padding: 15px; color: #000; text-decoration: none; font-size: 13px; font-weight: 600;">
                <i class="fa-brands fa-facebook-messenger" style="color: #006AFF; font-size: 18px;"></i> Messenger
            </a>
        </div>
    </div>

    <script>
        function toggleChatMenu() {
            const menu = document.getElementById('chatChannelsMenu');
            menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'flex' : 'none';
        }
        // Close menu if user clicks outside
        document.addEventListener('click', function(e) {
            const w = document.getElementById('helpChatWidget');
            if (w && !w.contains(e.target)) document.getElementById('chatChannelsMenu').style.display = 'none';
        });
    </script>
