<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | HG Customs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --text-dark: #000000; --text-muted: #555555; --bg-light: #f9f9f9; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); background-color: #ffffff; }
        
        /* Nav & Announcement */
        .announcement-bar { background-color: #000000; color: #ffffff; display: flex; justify-content: space-around; padding: 12px 20px; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #333; }
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); }
        .logo img { height: 55px; display: block; }
        .nav-links { display: flex; list-style: none; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 13px; text-transform: uppercase; }
        
        /* Content */
        .content-container { max-width: 650px; margin: 50px auto; padding: 0 20px; }
        .content-container h1 { font-size: 24px; text-transform: uppercase; border-bottom: 2px solid #000; margin-bottom: 30px; padding-bottom: 15px; }
        
        .contact-form { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .form-control { width: 100%; padding: 14px; border: 1px solid var(--border-color); font-family: inherit; }
        .btn-submit { background: #000; color: #fff; border: none; padding: 16px; cursor: pointer; text-transform: uppercase; font-size: 12px; font-weight: 600; }
        .whatsapp-btn { background: #25D366 !important; text-decoration: none; display: block; text-align: center; }

        /* Footer */
        .site-footer { margin-top: 60px; padding: 20px 40px; border-top: 1px solid var(--border-color); }
        .footer-content { display: flex; justify-content: space-between; align-items: center; }
        .footer-links { list-style: none; display: flex; gap: 30px; }
        .footer-links a { text-decoration: none; color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body>

    <div class="announcement-bar">
        <span>FREE UK DELIVERY On orders over £50</span>
    </div>

    <header class="main-header">
        <div class="logo"><a href="index.html"><img src="logo.png" alt="HG Customs"></a></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="t-shirts.html">T-Shirts</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-container">
        <h1>Contact Us</h1>

        <!-- WhatsApp Button -->
        <a href="https://wa.me/447702498975" target="_blank" class="btn-submit whatsapp-btn">
            <i class="fa-brands fa-whatsapp"></i> Message us on WhatsApp
        </a>

        <!-- Formspree Form -->
        <form action="https://formspree.io/f/xknpndbl" method="POST" class="contact-form">
            <input type="text" name="name" class="form-control" placeholder="Your Name" required>
            <input type="email" name="_replyto" class="form-control" placeholder="Email Address" required>
            <textarea name="message" class="form-control" style="height: 140px;" placeholder="How can we help?" required></textarea>
            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div style="font-size: 12px; color: var(--text-muted);">&copy; HG CUSTOMS 2026</div>
            <ul class="footer-links">
                <li><a href="delivery-info.html">Delivery Information</a></li>
                <li><a href="privacy-policy.html">Privacy Policy</a></li>
                <li><a href="terms.html">Terms & Conditions</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </footer>

</body>
</html>
