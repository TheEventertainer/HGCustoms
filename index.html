<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HG Customs | Made Your Way, Just For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --text-dark: #000000; --text-muted: #555555; --bg-light: #f9f9f9; --border-color: #e5e5e5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); }

        /* Header & Mobile Toggle */
        .main-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .logo img { height: 55px; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .mobile-toggle { display: none; font-size: 20px; cursor: pointer; }

        @media (max-width: 768px) {
            .mobile-toggle { display: block; }
            .nav-links { display: none; width: 100%; flex-direction: column; gap: 15px; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px; text-align: center; }
            .nav-links.is-open { display: flex; }
        }

        /* Hero */
        .hero { height: 500px; display: flex; align-items: center; padding: 0 80px; background: var(--bg-light); }
        .hero-title { font-size: 52px; font-weight: 700; text-transform: uppercase; }
        .hero-script { font-family: 'Playfair Display', serif; font-style: italic; font-size: 48px; margin-bottom: 25px; }
        .hero-btn { background: #000; color: #fff; padding: 15px 30px; text-decoration: none; text-transform: uppercase; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo"><a href="index.html"><img src="logo.png" alt="HG Customs"></a></div>
        
        <!-- Mobile Toggle Button -->
        <div class="mobile-toggle" onclick="document.querySelector('.nav-links').classList.toggle('is-open')">
            <i class="fa-solid fa-bars"></i>
        </div>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <a href="cart.html"><i class="fa-solid fa-basket-shopping"></i><span class="cart-count">0</span></a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Made Your Way,</h1>
            <div class="hero-script">Just for you.</div>
            <a href="shop.html" class="hero-btn">Shop Custom Products</a>
        </div>
    </section>

    <!-- Scripts -->
    <script>
        // Cart Logic
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('hg_cart')) || [];
            document.querySelectorAll('.cart-count').forEach(badge => badge.innerText = cart.length);
        }
        document.addEventListener('DOMContentLoaded', updateCartBadge);
    </script>
</body>
</html>
